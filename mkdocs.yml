site_name: Java Code Indexer
site_description: Java 项目的 MCP 代码索引工具文档
site_url: "https://sodlinken.github.io/java-code-indexer/"

repo_url: "https://github.com/sodlinken/java-code-indexer"
edit_uri: "edit/main/doc/"

docs_dir: doc
site_dir: _site

theme:
  name: material
  language: zh
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: 切换到暗色模式
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: 切换到亮色模式
  features:
    - navigation.sections
    - navigation.expand
    - content.code.copy
    - content.code.annotate
    - search.highlight

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - 首页: index.md
  - 快速入门:
      - getting-started/index.md
  - 设计文档:
      - design/index.md
  - API 参考:
      - api/index.md
