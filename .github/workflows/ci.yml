# Java Code Indexer CI Workflow
#
# 触发方式:
#   1. push 到 main 分支
#   2. 所有 Pull Request
#
# 任务:
#   - 运行单元测试
#   - 验证构建

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  JAVA_VERSION: "21"
  MAVEN_OPTS: "-Xmx512m"

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: "temurin"
          cache: "maven"

      - name: Run tests
        run: mvn test

      - name: Build
        run: mvn package -DskipTests
