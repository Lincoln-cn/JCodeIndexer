# Java Code Indexer Release Workflow
#
# 触发方式:
#   1. 推送 tag: v* (如 v0.1.0, v1.0.0)
#   2. 手动触发 (workflow_dispatch)
#
# 构建产物:
#   - Fat JAR (通用)
#   - Native Image (Linux amd64/arm64, macOS amd64/arm64)
#   - Docker 镜像 (推送到 GHCR)

name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "版本号 (如 0.1.0)"
        required: false
      build_native:
        description: "构建 Native Image"
        type: boolean
        default: false
      build_docker:
        description: "构建 Docker 镜像"
        type: boolean
        default: false

permissions:
  contents: write
  packages: write

env:
  JAVA_VERSION: "21"
  MAVEN_OPTS: "-Xmx512m"

jobs:
  # ─── 阶段 1: 构建 Fat JAR ─────────────────────────────
  build:
    name: Build Fat JAR
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: "temurin"
          cache: "maven"

      - name: Extract version
        id: version
        run: |
          if [[ -n "${{ inputs.version }}" ]]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          elif [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            # 从 pom.xml 读取
            VER=$(grep -oP '<version>\K[^<]+' pom.xml | head -1)
            if [[ "$VER" == *"-SNAPSHOT" ]]; then
              HASH=$(git rev-parse --short HEAD)
              VER="${VER%-SNAPSHOT}-${HASH}"
            fi
            echo "version=$VER" >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        run: mvn package -q -DskipTests

      - name: Rename JAR
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          JAR=$(find target -name "*-shaded.jar" -not -name "*.original" | head -1)
          cp "$JAR" "dist/java-code-indexer-${VERSION}.jar"
        working-directory: ${{ github.workspace }}

      - name: Upload Fat JAR
        uses: actions/upload-artifact@v4
        with:
          name: fat-jar
          path: dist/java-code-indexer-*.jar
          retention-days: 5

      - name: Upload JAR for Native builds
        uses: actions/upload-artifact@v4
        with:
          name: shaded-jar
          path: target/*-shaded.jar
          retention-days: 1

  # ─── 阶段 2: Native Image 矩阵构建 ───────────────────
  native:
    name: Native Image (${{ matrix.os }}-${{ matrix.arch }})
    needs: build
    if: inputs.build_native || startsWith(github.ref, 'refs/tags/v*')
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
            runner: ubuntu-latest
          - os: linux
            arch: arm64
            runner: ubuntu-latest
          - os: darwin
            arch: amd64
            runner: macos-latest
          - os: darwin
            arch: arm64
            runner: macos-latest
          - os: windows
            arch: amd64
            runner: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: "graalvm"
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download JAR
        uses: actions/download-artifact@v4
        with:
          name: shaded-jar
          path: target/

      - name: Fix sqlite-jdbc multi-release JAR
        run: |
          # sqlite-jdbc 把 GraalVM Feature 放在 META-INF/versions/9/
          # native-image 无法识别，需要提取到根路径
          JAR=$(find target -name "*-shaded.jar" | head 1)
          WORK_JAR="target/jindexer-build.jar"
          cp "$JAR" "$WORK_JAR"

          # 提取 Feature 类
          TMP_EXTRACT=$(mktemp -d)
          unzip -qo "$WORK_JAR" "META-INF/versions/9/org/sqlite/*" -d "$TMP_EXTRACT" 2>/dev/null || true

          if [[ -d "$TMP_EXTRACT/META-INF/versions/9/org/sqlite/nativeimage" ]]; then
            echo "Fixing sqlite-jdbc multi-release JAR..."
            # 从 versions/9 下移除 sqlite 目录
            zip -qd "$WORK_JAR" "META-INF/versions/9/org/sqlite/*" 2>/dev/null || true
            # 将 Feature 类放到 JAR 根路径
            (cd "$TMP_EXTRACT/META-INF/versions/9" && zip -qr "$WORK_JAR" org/sqlite/nativeimage/)
          fi
          rm -rf "$TMP_EXTRACT"
          echo "jindexer-build.jar" > target/jar-name.txt

      - name: Build Native Image
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          WORK_JAR="target/jindexer-build.jar"
          native-image -jar "$WORK_JAR" \
            -o "jindexer" \
            --no-fallback \
            -H:+ReportExceptionStackTraces \
            -H:+UnlockExperimentalVMOptions \
            -H:ConfigurationFileDirectories=src/main/resources/META-INF/native-image/com.sodlinken/jcodeindexer

      - name: Package
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          ARCH="${{ matrix.arch }}"
          OS="${{ matrix.os }}"
          DIR="dist/java-code-indexer-${VERSION}-${OS}-${ARCH}"
          mkdir -p "$DIR"
          # Windows 上添加 .exe 后缀
          if [[ "${{ matrix.os }}" == "windows" ]]; then
            mv jindexer.exe "$DIR/"
          else
            mv jindexer "$DIR/"
          fi
          cp LICENSE "$DIR/" 2>/dev/null || true
          # Windows 使用 zip，其他平台使用 tar.gz
          if [[ "${{ matrix.os }}" == "windows" ]]; then
            cd dist && zip -r "java-code-indexer-${VERSION}-${OS}-${ARCH}.zip" "$DIR" && cd ..
          else
            tar -czf "dist/java-code-indexer-${VERSION}-${OS}-${ARCH}.tar.gz" -C dist "$DIR"
          fi
          rm -rf "$DIR"

      - name: Upload Native
        uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.os }}-${{ matrix.arch }}
          path: |
            dist/java-code-indexer-*.tar.gz
            dist/java-code-indexer-*.zip
          retention-days: 5

  # ─── 阶段 3: Docker 镜像 ──────────────────────────────
  docker:
    name: Docker Image
    needs: build
    if: inputs.build_docker
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download JAR
        uses: actions/download-artifact@v4
        with:
          name: shaded-jar
          path: target/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            JAR_FILE=${{ github.workspace }}/target/*-shaded.jar
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── 阶段 4: 创建 GitHub Release ──────────────────────
  release:
    name: Create Release
    needs: [build, native]
    if: startsWith(github.ref, 'refs/tags/v*')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: List artifacts
        run: find dist/ -type f | sort

      - name: Generate checksums
        working-directory: dist
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          : > "checksums-${VERSION}.sha256"
          for f in *.jar *.tar.gz *.zip; do
            [ -f "$f" ] && sha256sum "$f" >> "checksums-${VERSION}.sha256"
          done
          echo "--- Checksums ---"
          cat "checksums-${VERSION}.sha256"

      - name: Generate release notes
        id: notes
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          PREV_TAG=$(git tag -l "v*" --sort=-v:refname | head -2 | tail -1)

          NOTES="## What's Changed"$'\n\n'
          if [[ -n "$PREV_TAG" ]]; then
            NOTES+="**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${{ github.ref_name }}"$'\n\n'
            CHANGES=$(git log "${PREV_TAG}..HEAD" --pretty=format:"- %s" --no-merges)
          else
            CHANGES=$(git log --pretty=format:"- %s" --no-merges)
          fi

          NOTES+="$CHANGES"

          echo "notes<<EOF" >> "$GITHUB_OUTPUT"
          echo "$NOTES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Java Code Indexer v${{ needs.build.outputs.version }}"
          body: ${{ steps.notes.outputs.notes }}
          draft: false
          prerelease: ${{ contains(needs.build.outputs.version, '-') }}
          files: |
            dist/java-code-indexer-*.jar
            dist/java-code-indexer-*-linux-amd64.tar.gz
            dist/java-code-indexer-*-linux-arm64.tar.gz
            dist/java-code-indexer-*-darwin-amd64.tar.gz
            dist/java-code-indexer-*-darwin-arm64.tar.gz
            dist/java-code-indexer-*-windows-amd64.zip
            dist/checksums-*.sha256
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
