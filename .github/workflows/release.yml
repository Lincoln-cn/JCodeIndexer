# Java Code Indexer Release Workflow
#
# 触发方式:
#   1. 推送 tag: v* (如 v0.1.0, v1.0.0)
#   2. 手动触发 (workflow_dispatch)
#
# 构建产物:
#   - Fat JAR (通用)
#   - Native Image (Linux amd64/arm64, macOS amd64/arm64)
#   - Docker 镜像 (推送到 GHCR)

name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "版本号 (如 0.1.0)"
        required: false
      build_native:
        description: "构建 Native Image"
        type: boolean
        default: false
      build_docker:
        description: "构建 Docker 镜像"
        type: boolean
        default: false

permissions:
  contents: write
  packages: write

env:
  JAVA_VERSION: "21"
  MAVEN_OPTS: "-Xmx512m"

jobs:
  # ─── 阶段 1: 构建 Fat JAR ─────────────────────────────
  build:
    name: Build Fat JAR
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: "temurin"
          cache: "maven"

      - name: Extract version
        id: version
        run: |
          if [[ -n "${{ inputs.version }}" ]]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          elif [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            # 从 pom.xml 读取
            VER=$(grep -oP '<version>\K[^<]+' pom.xml | head -1)
            if [[ "$VER" == *"-SNAPSHOT" ]]; then
              HASH=$(git rev-parse --short HEAD)
              VER="${VER%-SNAPSHOT}-${HASH}"
            fi
            echo "version=$VER" >> "$GITHUB_OUTPUT"
          fi

      - name: Run tests
        run: mvn test

      - name: Build
        run: mvn package -DskipTests

      - name: List target directory
        run: ls -la target/
        working-directory: ${{ github.workspace }}

      - name: Rename JAR
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          mkdir -p dist
          # Shade plugin replaces original JAR with shaded one, renaming original to original-*
          JAR=$(find target -maxdepth 1 -name "*.jar" -not -name "original-*" | head -1)
          if [[ -z "$JAR" ]]; then
            echo "ERROR: No JAR found in target directory"
            ls -la target/
            exit 1
          fi
          echo "Using JAR: $JAR"
          cp "$JAR" "dist/java-code-indexer-${VERSION}.jar"
        working-directory: ${{ github.workspace }}

      - name: Upload Fat JAR
        uses: actions/upload-artifact@v4
        with:
          name: fat-jar
          path: dist/java-code-indexer-*.jar
          retention-days: 5

      - name: Upload JAR for Native builds
        uses: actions/upload-artifact@v4
        with:
          name: shaded-jar
          path: target/java-code-indexer-*.jar
          retention-days: 1

  # ─── 阶段 2: Native Image 矩阵构建 ───────────────────
  native:
    name: Native Image (${{ matrix.os }}-${{ matrix.arch }})
    needs: build
    if: ${{ github.event_name == 'push' || inputs.build_native == true }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
            runner: ubuntu-latest
          - os: darwin
            arch: arm64
            runner: macos-latest
          - os: windows
            arch: amd64
            runner: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: "graalvm"
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download JAR
        uses: actions/download-artifact@v4
        with:
          name: shaded-jar
          path: target/

      - name: Build Native Image
        shell: bash
        run: |
          echo "=== Building Native Image ==="

          # Find JAR file
          JAR=$(find target -maxdepth 1 -name "*.jar" -not -name "original-*" | head -n 1)
          echo "Found JAR: $JAR"

          # Create work JAR
          WORK_JAR="$(pwd)/target/jindexer-build.jar"
          cp "$JAR" "$WORK_JAR"

          # Remove sqlite-jdbc native-image configuration that causes issues
          echo "Removing problematic sqlite-jdbc config..."
          TMP_EXTRACT=$(mktemp -d)
          cd "$TMP_EXTRACT"
          jar xf "$WORK_JAR"
          rm -rf META-INF/native-image/org.xerial/sqlite-jdbc 2>/dev/null || true
          rm -rf META-INF/versions/9/org/sqlite/nativeimage 2>/dev/null || true
          jar cfm "$WORK_JAR" META-INF/MANIFEST.MF .
          cd "$GITHUB_WORKSPACE"
          rm -rf "$TMP_EXTRACT"

          # Convert Windows path for GraalVM
          GRAALVM_HOME_FIXED=$(echo "$GRAALVM_HOME" | sed 's|\\|/|g')
          export PATH="$GRAALVM_HOME_FIXED/bin:$PATH"

          # Determine native-image command
          if [[ "${{ matrix.os }}" == "windows" ]]; then
            NATIVE_IMAGE="native-image.cmd"
          else
            NATIVE_IMAGE="native-image"
          fi

          echo "Using native-image: $NATIVE_IMAGE"
          echo "Working directory: $(pwd)"

          # Build native image
          "$NATIVE_IMAGE" -jar "$WORK_JAR" \
            -o "jindexer" \
            --no-fallback \
            -H:+ReportExceptionStackTraces \
            -H:+UnlockExperimentalVMOptions \
            -H:ConfigurationFileDirectories=src/main/resources/META-INF/native-image/com.sodlinken/jcodeindexer

          echo "=== Build completed ==="
          echo "Files in current directory:"
          ls -la jindexer* 2>/dev/null || echo "No jindexer files found"

      - name: Package
        shell: bash
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          ARCH="${{ matrix.arch }}"
          OS="${{ matrix.os }}"
          DIR="dist/java-code-indexer-${VERSION}-${OS}-${ARCH}"
          mkdir -p "$DIR"
          # Windows 上添加 .exe 后缀
          if [[ "${{ matrix.os }}" == "windows" ]]; then
            mv jindexer.exe "$DIR/"
          else
            mv jindexer "$DIR/"
          fi
          cp LICENSE "$DIR/" 2>/dev/null || true
          # Windows 使用 zip，其他平台使用 tar.gz
          if [[ "${{ matrix.os }}" == "windows" ]]; then
            cd dist && zip -r "java-code-indexer-${VERSION}-${OS}-${ARCH}.zip" "$(basename $DIR)" && cd ..
          else
            tar -czf "dist/java-code-indexer-${VERSION}-${OS}-${ARCH}.tar.gz" -C dist "$(basename $DIR)"
          fi
          rm -rf "$DIR"

      - name: Upload Native
        uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.os }}-${{ matrix.arch }}
          path: |
            dist/java-code-indexer-*.tar.gz
            dist/java-code-indexer-*.zip
          retention-days: 5

  # ─── 阶段 3: Docker 镜像 ──────────────────────────────
  docker:
    name: Docker Image
    needs: build
    if: inputs.build_docker || github.ref_type == 'tag'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download JAR
        uses: actions/download-artifact@v4
        with:
          name: shaded-jar
          path: target/

      - name: Extract version
        id: version
        run: |
          if [[ -n "${{ inputs.version }}" ]]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          elif [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            VER=$(grep -oP '<version>\K[^<]+' pom.xml | head -1)
            if [[ "$VER" == *"-SNAPSHOT" ]]; then
              HASH=$(git rev-parse --short HEAD)
              VER="${VER%-SNAPSHOT}-${HASH}"
            fi
            echo "version=$VER" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: sodlinken/jcodeindexer
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            JAR_FILE=${{ github.workspace }}/target/*-shaded.jar
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Export offline image
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          mkdir -p dist
          docker save sodlinken/jcodeindexer:${VERSION} | gzip > dist/docker-image-${VERSION}.tar.gz

      - name: Upload Docker image
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: dist/docker-image-*.tar.gz
          retention-days: 5

  # ─── 阶段 4: 创建 GitHub Release ──────────────────────
  release:
    name: Create Release
    needs: [build, native, docker]
    if: always() && needs.build.result == 'success' && github.ref_type == 'tag'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: List artifacts
        run: find dist/ -type f | sort

      - name: Generate checksums
        working-directory: dist
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          : > "checksums-${VERSION}.sha256"
          for f in *.jar *.tar.gz *.zip; do
            [ -f "$f" ] && sha256sum "$f" >> "checksums-${VERSION}.sha256"
          done
          echo "--- Checksums ---"
          cat "checksums-${VERSION}.sha256"

      - name: Generate release notes
        id: notes
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          PREV_TAG=$(git tag -l "v*" --sort=-v:refname | head -2 | tail -1)

          cat > notes.md << 'HEREDOC'
          ## 🚀 Java Code Indexer v${VERSION}

          > Java AST-level code indexer with SQLite storage, exposed as an MCP server for AI coding assistants.

          ---

          ### 📊 开发状态

          | 指标 | 状态 |
          |------|------|
          | **当前版本** | v${VERSION} |
          | **开发阶段** | Alpha |
          | **稳定性** | 核心功能稳定，API 可能调整 |
          | **Java 版本要求** | 21+ |
          | **最后更新** | ${GITHUB_SHA::8} |

          ---

          ### ✨ 核心功能

          #### 🔍 代码索引
          - **符号索引**：类、方法、字段的完整定义和位置
          - **引用追踪**：符号在整个代码库中的使用位置
          - **调用图**：方法调用关系（调用者/被调用者）
          - **增量索引**：基于 SHA-1 哈希的智能跳过未变更文件

          #### 🛠 MCP 工具
          | 工具 | 功能 |
          |------|------|
          | `find_symbol` | 按名称查找符号，支持通配符 |
          | `find_references` | 查找符号的所有引用位置 |
          | `get_call_graph` | 方法调用图分析 |
          | `search_code` | 搜索符号名和代码内容 |
          | `get_file_info` | 文件详情：符号、代码块、调用关系 |
          | `search_config` | 搜索配置文件 (YAML/Properties/.env) |
          | `find_dependencies` | 搜索项目依赖 (Maven/Gradle) |

          #### 📦 分发方式
          - **Fat JAR**：通用 Java 21+ 运行时
          - **Native Image**：GraalVM 原生镜像，启动即时
          - **Docker**：容器化部署，支持多平台
          - **多平台支持**：Linux (amd64/arm64)、macOS (amd64/arm64)、Windows (amd64)

          ---

          ### 📝 更新日志

          HEREDOC

          # 追加版本号到 notes.md
          sed -i "s/\${VERSION}/$VERSION/g" notes.md

          # 追加变更历史
          if [[ -n "$PREV_TAG" ]]; then
            echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${{ github.ref_name }}" >> notes.md
            echo "" >> notes.md
            git log "${PREV_TAG}..HEAD" --pretty=format:"- %s" --no-merges >> notes.md
          else
            git log --pretty=format:"- %s" --no-merges >> notes.md
          fi

          # 追加安装说明
          cat >> notes.md << 'HEREDOC'

          ---

          ### 📥 安装说明

          #### Fat JAR
          ```bash
          java -jar java-code-indexer-${VERSION}.jar --project-root /path/to/project
          ```

          #### Native Image
          ```bash
          # Linux/macOS
          ./jindexer --project-root /path/to/project --index
          ./jindexer --project-root /path/to/project

          # Windows
          jindexer.exe --project-root /path/to/project --index
          ```

          #### Docker
          ```bash
          docker pull sodlinken/jcodeindexer:${VERSION}
          docker run --rm -v /path/to/project:/project sodlinken/jcodeindexer:${VERSION} --project-root /project --index
          ```

          #### Docker 离线镜像
          ```bash
          # 加载离线镜像
          docker load < docker-image-${VERSION}.tar.gz
          docker run --rm -v /path/to/project:/project sodlinken/jcodeindexer:${VERSION} --project-root /project
          ```

          ---

          ### 🔧 环境变量

          | 变量 | 说明 | 默认值 |
          |------|------|--------|
          | `INDEXER_EMBEDDING_ENABLED` | 启用 Embedding API | `false` |
          | `INDEXER_EMBEDDING_BASE_URL` | Embedding API 端点 | - |
          | `INDEXER_EMBEDDING_MODEL` | Embedding 模型名称 | - |
          | `INDEXER_THREADS` | 索引线程数 | `4` |
          | `INDEXER_LOG_LEVEL` | 日志级别 | `INFO` |

          HEREDOC

          # 替换版本号
          sed -i "s/\${VERSION}/$VERSION/g" notes.md

          # 输出到 GITHUB_OUTPUT
          echo "notes<<EOF" >> "$GITHUB_OUTPUT"
          cat notes.md >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Java Code Indexer v${{ needs.build.outputs.version }}"
          body: ${{ steps.notes.outputs.notes }}
          draft: false
          prerelease: ${{ contains(needs.build.outputs.version, '-') }}
          files: |
            dist/java-code-indexer-*.jar
            dist/java-code-indexer-*-linux-amd64.tar.gz
            dist/java-code-indexer-*-darwin-arm64.tar.gz
            dist/java-code-indexer-*-windows-amd64.zip
            dist/docker-image-*.tar.gz
            dist/checksums-*.sha256
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
